<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서울 지하철 혼잡 회피 경로 추천</title>
  <style>
    :root {
      --primary: #0052A4;
      --primary-light: #EBF2FF;
      --bg: #F4F6FA;
      --card: #FFFFFF;
      --border: #E0E6EF;
      --text: #1A2333;
      --text-muted: #6B7A99;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,82,164,0.08);
      --cong-low: #4CAF50; --cong-mid: #FFC107;
      --cong-high: #FF9800; --cong-crit: #F44336;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── API 설정 배너 ── */
    #api-config-bar {
      background: #FFF8E1;
      border-bottom: 1px solid #FFE082;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
      flex-wrap: wrap;
    }
    #api-config-bar label { font-weight: 600; color: #795548; white-space: nowrap; }
    #api-url-input {
      flex: 1;
      min-width: 260px;
      border: 1.5px solid #FFD54F;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.82rem;
      outline: none;
    }
    #api-url-input:focus { border-color: var(--primary); }
    .btn-sm {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-sm:hover { background: #003d7a; }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,82,164,0.3);
    }
    .header-title { display: flex; align-items: center; gap: 10px; }
    .header-title h1 { font-size: 1.1rem; font-weight: 700; }
    #api-status {
      font-size: 0.78rem;
      background: rgba(255,255,255,0.15);
      padding: 4px 10px;
      border-radius: 20px;
      display: flex; align-items: center; gap: 5px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #aaa; display: inline-block; }
    .dot.ok  { background: #4CFFA0; }
    .dot.err { background: #FF6B6B; }

    /* ── Tabs ── */
    .tabs {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; padding: 0 20px; gap: 4px;
    }
    .tab {
      background: none; border: none;
      padding: 14px 20px; font-size: 0.9rem; font-weight: 600;
      color: var(--text-muted); cursor: pointer;
      border-bottom: 3px solid transparent; transition: all 0.2s;
    }
    .tab:hover { color: var(--primary); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    main { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow);
      padding: 24px; margin-bottom: 20px;
    }
    .card h2 { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 18px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }
    .form-group input, .form-group select {
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 9px 12px; font-size: 0.9rem; color: var(--text);
      outline: none; transition: border-color 0.2s; background: #FAFBFD;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--primary); background: #fff; }
    .btn {
      background: var(--primary); color: #fff; border: none;
      border-radius: 8px; padding: 11px 28px; font-size: 0.9rem;
      font-weight: 700; cursor: pointer; transition: all 0.2s; width: 100%;
    }
    .btn:hover { background: #003d7a; }
    .btn:active { transform: scale(0.98); }

    .result-card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow);
      padding: 20px; margin-bottom: 12px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .result-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .station-name { font-size: 1.2rem; font-weight: 700; }
    .line-badge { font-size: 0.75rem; font-weight: 700; color: #fff; padding: 3px 10px; border-radius: 20px; }
    .time-badge { font-size: 0.8rem; color: var(--text-muted); background: var(--bg); padding: 4px 10px; border-radius: 20px; }

    .cong-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .cong-label { font-size: 0.8rem; color: var(--text-muted); width: 56px; flex-shrink: 0; }
    .cong-bar-wrap { flex: 1; background: #EEF0F5; border-radius: 6px; height: 18px; overflow: hidden; }
    .cong-bar { height: 100%; border-radius: 6px; transition: width 0.6s cubic-bezier(.4,0,.2,1); min-width: 4px; }
    .cong-value { font-size: 0.82rem; font-weight: 700; width: 42px; text-align: right; flex-shrink: 0; }
    .cong-level-tag { font-size: 0.7rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; }
    .avg-row { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .avg-value { font-size: 1.4rem; font-weight: 800; }

    .rank-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--bg); }
    .rank-item:last-child { border-bottom: none; }
    .rank-num { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); width: 28px; text-align: center; flex-shrink: 0; }
    .rank-num.top3 { color: var(--cong-crit); font-size: 1rem; }
    .rank-station-name { font-size: 0.92rem; font-weight: 600; width: 90px; flex-shrink: 0; }
    .rank-bar-wrap { flex: 1; background: #EEF0F5; border-radius: 6px; height: 14px; overflow: hidden; }
    .rank-bar { height: 100%; border-radius: 6px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
    .rank-val { font-size: 0.82rem; font-weight: 700; width: 40px; text-align: right; flex-shrink: 0; }

    .route-summary { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .summary-chip { background: var(--primary-light); color: var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 700; }
    .timeline { position: relative; padding-left: 32px; }
    .timeline::before { content: ''; position: absolute; left: 10px; top: 12px; bottom: 12px; width: 2px; background: var(--border); }
    .tl-node { position: relative; padding: 8px 0 8px 16px; display: flex; align-items: center; gap: 12px; }
    .tl-dot { position: absolute; left: -26px; width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid #fff; box-shadow: 0 0 0 2px var(--border); flex-shrink: 0; }
    .tl-node:first-child .tl-dot, .tl-node:last-child .tl-dot { width: 18px; height: 18px; left: -28px; }
    .tl-station { font-size: 0.9rem; font-weight: 600; flex: 1; }
    .tl-cong { font-size: 0.78rem; font-weight: 700; padding: 2px 8px; border-radius: 12px; }
    .tl-weight { font-size: 0.76rem; color: var(--text-muted); }

    .loading { text-align: center; padding: 32px; color: var(--text-muted); font-size: 0.9rem; }
    .loading::after { content: ''; display: inline-block; width: 18px; height: 18px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: #FFF0F0; color: #C62828; border: 1px solid #FFCDD2; border-radius: 8px; padding: 14px 16px; font-size: 0.87rem; }

    @media (max-width: 500px) {
      .form-grid { grid-template-columns: 1fr; }
      .tab { padding: 12px 12px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<!-- API URL 설정 배너 -->
<div id="api-config-bar">
  <label>🔧 백엔드 API URL</label>
  <input type="text" id="api-url-input" placeholder="https://your-app.onrender.com">
  <button class="btn-sm" onclick="saveApiUrl()">저장 후 연결</button>
  <span id="config-msg" style="color:#2E7D32;font-weight:600"></span>
</div>

<header>
  <div class="header-title">
    <span>🚇</span>
    <h1>서울 지하철 혼잡 회피 경로 추천</h1>
  </div>
  <div id="api-status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">연결 확인 중</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="station">역 혼잡도</button>
  <button class="tab" data-tab="ranking">노선 순위</button>
  <button class="tab" data-tab="route">경로 추천</button>
</div>

<main>
  <!-- Tab 1 -->
  <section id="tab-station" class="tab-content active">
    <div class="card">
      <h2>🔍 역별 혼잡도 조회</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>역 이름</label>
          <input type="text" id="s-station" placeholder="예: 강남" list="station-list">
          <datalist id="station-list"></datalist>
        </div>
        <div class="form-group">
          <label>시각</label>
          <input type="time" id="s-time" value="08:30" step="1800">
        </div>
        <div class="form-group">
          <label>요일구분</label>
          <select id="s-daytype"><option>평일</option><option>토요일</option><option>일요일</option></select>
        </div>
        <div class="form-group">
          <label>호선 (환승역 구분)</label>
          <select id="s-line"><option value="">전체</option></select>
        </div>
      </div>
      <button class="btn" onclick="searchStation()">혼잡도 조회</button>
    </div>
    <div id="station-result"></div>
  </section>

  <!-- Tab 2 -->
  <section id="tab-ranking" class="tab-content">
    <div class="card">
      <h2>📊 노선별 혼잡 순위</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>호선</label>
          <select id="r-line"><option>2호선</option></select>
        </div>
        <div class="form-group">
          <label>시각</label>
          <input type="time" id="r-time" value="08:30" step="1800">
        </div>
        <div class="form-group">
          <label>요일구분</label>
          <select id="r-daytype"><option>평일</option><option>토요일</option><option>일요일</option></select>
        </div>
        <div class="form-group">
          <label>상위 N개</label>
          <input type="number" id="r-topn" value="15" min="1" max="100">
        </div>
      </div>
      <button class="btn" onclick="searchRanking()">순위 조회</button>
    </div>
    <div id="ranking-result"></div>
  </section>

  <!-- Tab 3 -->
  <section id="tab-route" class="tab-content">
    <div class="card">
      <h2>🗺️ 혼잡 회피 경로 추천</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>출발역</label>
          <input type="text" id="rt-start" placeholder="예: 강남" list="station-list">
        </div>
        <div class="form-group">
          <label>도착역</label>
          <input type="text" id="rt-end" placeholder="예: 홍대입구" list="station-list">
        </div>
        <div class="form-group">
          <label>시각</label>
          <input type="time" id="rt-time" value="08:30" step="1800">
        </div>
        <div class="form-group">
          <label>요일구분</label>
          <select id="rt-daytype"><option>평일</option><option>토요일</option><option>일요일</option></select>
        </div>
      </div>
      <button class="btn" onclick="searchRoute()">최적 경로 탐색</button>
    </div>
    <div id="route-result"></div>
  </section>
</main>

<script>
// ── API URL 관리 ──────────────────────────────────────────
let API = localStorage.getItem('subway_api_url') || 'http://localhost:8000';
document.getElementById('api-url-input').value = API;

function saveApiUrl() {
  const val = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
  if (!val) return;
  API = val;
  localStorage.setItem('subway_api_url', val);
  document.getElementById('config-msg').textContent = '✓ 저장됨';
  setTimeout(() => document.getElementById('config-msg').textContent = '', 2000);
  checkApi();
}

// ── 탭 전환 ──────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});

// ── 혼잡도 헬퍼 ──────────────────────────────────────────
const LINE_COLORS = {
  '1호선':'#0052A4','2호선':'#00A84D','3호선':'#EF7C1C',
  '4호선':'#00A5DE','5호선':'#996CAC','6호선':'#CD7C2F',
  '7호선':'#747F00','8호선':'#E6186C'
};
function congColor(v) {
  if (v < 50)  return '#4CAF50';
  if (v < 100) return '#FFC107';
  if (v < 130) return '#FF9800';
  return '#F44336';
}
function congLabel(v) {
  if (v < 50)  return { text:'여유',     bg:'#E8F5E9', color:'#2E7D32' };
  if (v < 100) return { text:'보통',     bg:'#FFF8E1', color:'#F57F17' };
  if (v < 130) return { text:'혼잡',     bg:'#FFF3E0', color:'#E65100' };
  return              { text:'매우 혼잡', bg:'#FFEBEE', color:'#C62828' };
}
function barWidth(v) { return Math.min(v / 160 * 100, 100).toFixed(1); }

// ── API 연결 확인 ────────────────────────────────────────
async function checkApi() {
  document.getElementById('status-dot').className = 'dot';
  document.getElementById('status-text').textContent = '연결 확인 중';
  try {
    const res = await fetch(`${API}/`);
    if (res.ok) {
      document.getElementById('status-dot').className = 'dot ok';
      document.getElementById('status-text').textContent = '서버 연결됨';
      loadMeta();
    } else throw new Error();
  } catch {
    document.getElementById('status-dot').className = 'dot err';
    document.getElementById('status-text').textContent = '서버 연결 안됨';
  }
}

async function loadMeta() {
  try {
    const [metaRes, stationsRes] = await Promise.all([
      fetch(`${API}/api/congestion/meta`),
      fetch(`${API}/api/congestion/stations`),
    ]);
    const meta = await metaRes.json();
    const { stations } = await stationsRes.json();
    const sLine = document.getElementById('s-line');
    const rLine = document.getElementById('r-line');
    sLine.innerHTML = '<option value="">전체</option>';
    rLine.innerHTML = '';
    meta.available_lines.forEach(line => {
      sLine.innerHTML += `<option>${line}</option>`;
      rLine.innerHTML += `<option>${line}</option>`;
    });
    const dl = document.getElementById('station-list');
    dl.innerHTML = '';
    stations.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      dl.appendChild(opt);
    });
  } catch(e) { console.error('메타 로드 실패', e); }
}

// ── 역 혼잡도 조회 ───────────────────────────────────────
async function searchStation() {
  const station = document.getElementById('s-station').value.trim();
  const time    = document.getElementById('s-time').value;
  const day     = document.getElementById('s-daytype').value;
  const line    = document.getElementById('s-line').value;
  const out     = document.getElementById('station-result');
  if (!station) { out.innerHTML = '<p class="error-msg">역 이름을 입력해주세요.</p>'; return; }
  out.innerHTML = '<div class="loading">조회 중</div>';
  try {
    let url = `${API}/api/congestion/station?station=${encodeURIComponent(station)}&time=${time}&day_type=${encodeURIComponent(day)}`;
    if (line) url += `&line=${encodeURIComponent(line)}`;
    const res = await fetch(url);
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail); }
    out.innerHTML = renderStation(await res.json());
  } catch(e) { out.innerHTML = `<p class="error-msg">⚠️ ${e.message}</p>`; }
}

function renderStation(d) {
  const lc = LINE_COLORS[d.line] || '#888';
  const lbl = congLabel(d.average_congestion);
  let bars = '';
  for (const [dir, val] of Object.entries(d.congestion_by_direction)) {
    const l = congLabel(val);
    bars += `<div class="cong-row">
      <span class="cong-label">${dir}</span>
      <div class="cong-bar-wrap"><div class="cong-bar" style="width:${barWidth(val)}%;background:${congColor(val)}"></div></div>
      <span class="cong-value" style="color:${congColor(val)}">${val}</span>
      <span class="cong-level-tag" style="background:${l.bg};color:${l.color}">${l.text}</span>
    </div>`;
  }
  return `<div class="result-card">
    <div class="result-header">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="station-name">${d.station}</span>
        <span class="line-badge" style="background:${lc}">${d.line}</span>
      </div>
      <span class="time-badge">📅 ${d.day_type} · ⏰ ${d.time_column}</span>
    </div>
    ${bars}
    <div class="avg-row">
      <span style="font-size:0.85rem;font-weight:600;color:var(--text-muted)">전 방향 평균 혼잡도</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="avg-value" style="color:${congColor(d.average_congestion)}">${d.average_congestion}</span>
        <span class="cong-level-tag" style="background:${lbl.bg};color:${lbl.color};font-size:0.8rem">${lbl.text}</span>
      </div>
    </div>
  </div>`;
}

// ── 노선 순위 ────────────────────────────────────────────
async function searchRanking() {
  const line  = document.getElementById('r-line').value;
  const time  = document.getElementById('r-time').value;
  const day   = document.getElementById('r-daytype').value;
  const topN  = document.getElementById('r-topn').value;
  const out   = document.getElementById('ranking-result');
  out.innerHTML = '<div class="loading">조회 중</div>';
  try {
    const url = `${API}/api/congestion/line/${encodeURIComponent(line)}/ranking?time=${time}&day_type=${encodeURIComponent(day)}&top_n=${topN}`;
    const res = await fetch(url);
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail); }
    out.innerHTML = renderRanking(await res.json());
  } catch(e) { out.innerHTML = `<p class="error-msg">⚠️ ${e.message}</p>`; }
}

function renderRanking(d) {
  const lc = LINE_COLORS[d.line] || '#888';
  const medals = ['🥇','🥈','🥉'];
  const items = d.stations.map((s, i) => {
    const rankDisplay = i < 3
      ? `<span class="rank-num top3">${medals[i]}</span>`
      : `<span class="rank-num">${s.rank}</span>`;
    return `<div class="rank-item">
      ${rankDisplay}
      <span class="rank-station-name">${s.station}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${barWidth(s.average_congestion)}%;background:${congColor(s.average_congestion)}"></div></div>
      <span class="rank-val" style="color:${congColor(s.average_congestion)}">${s.average_congestion}</span>
    </div>`;
  }).join('');
  return `<div class="result-card">
    <div class="result-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="line-badge" style="background:${lc}">${d.line}</span>
        <span style="font-weight:700">혼잡 순위 TOP ${d.stations.length}</span>
      </div>
      <span class="time-badge">📅 ${d.day_type} · ⏰ ${d.time_column}</span>
    </div>
    ${items}
  </div>`;
}

// ── 경로 추천 ────────────────────────────────────────────
async function searchRoute() {
  const start = document.getElementById('rt-start').value.trim();
  const end   = document.getElementById('rt-end').value.trim();
  const time  = document.getElementById('rt-time').value;
  const day   = document.getElementById('rt-daytype').value;
  const out   = document.getElementById('route-result');
  if (!start || !end) { out.innerHTML = '<p class="error-msg">출발역과 도착역을 입력해주세요.</p>'; return; }
  if (start === end)  { out.innerHTML = '<p class="error-msg">출발역과 도착역이 같습니다.</p>'; return; }
  out.innerHTML = '<div class="loading">경로 탐색 중</div>';
  try {
    const url = `${API}/api/congestion/route?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}&time=${time}&day_type=${encodeURIComponent(day)}`;
    const res = await fetch(url);
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail); }
    out.innerHTML = renderRoute(await res.json());
  } catch(e) { out.innerHTML = `<p class="error-msg">⚠️ ${e.message}</p>`; }
}

function renderRoute(d) {
  const nodes = d.path.map((node, i) => {
    const isEndpoint = i === 0 || i === d.path.length - 1;
    const lbl = congLabel(node.congestion);
    const wt  = i > 0 ? `<span class="tl-weight">(누적 ${node.cumulative_weight.toFixed(1)})</span>` : '';
    return `<div class="tl-node">
      <div class="tl-dot" style="background:${congColor(node.congestion)};box-shadow:0 0 0 2px ${congColor(node.congestion)}44"></div>
      <span class="tl-station" style="${isEndpoint?'font-size:1rem':''}">${node.station}</span>
      <span class="tl-cong" style="background:${lbl.bg};color:${lbl.color}">${node.congestion}</span>
      ${wt}
    </div>`;
  }).join('');
  const avg = (d.path.reduce((s, n) => s + n.congestion, 0) / d.path.length).toFixed(1);
  const lbl = congLabel(avg);
  return `<div class="result-card">
    <div class="result-header">
      <span style="font-weight:700;font-size:1rem">${d.start} → ${d.end}</span>
      <span class="time-badge">📅 ${d.day_type} · ⏰ ${d.time_column}</span>
    </div>
    <div class="route-summary">
      <span class="summary-chip">🚉 ${d.total_stops} 정거장</span>
      <span class="summary-chip">⚖️ 총 가중치 ${d.total_weight}</span>
      <span class="summary-chip" style="background:${lbl.bg};color:${lbl.color}">평균 혼잡도 ${avg}</span>
    </div>
    <div class="timeline">${nodes}</div>
  </div>`;
}

// ── 초기화 ───────────────────────────────────────────────
checkApi();
</script>
</body>
</html>
